name: Python

on:
  push:
    branches: [main, feat-*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/uv-setup-action@v1

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install ruff --python .venv/bin/python

      - name: Run ruff check
        run: .venv/bin/python -m ruff check --fix .

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/uv-setup-action@v1

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install ruff --python .venv/bin/python

      - name: Check formatting
        run: .venv/bin/python -m ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/uv-setup-action@v1

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install pyrefly --python .venv/bin/python

      - name: Run pyrefly
        run: .venv/bin/python -m pyrefly check .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/uv-setup-action@v1

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        run: |
          cd python
          uv venv .venv --python 3.11
          uv pip install maturin --python .venv/bin/python
          .venv/bin/python -m maturin build -b pyo3 -i .venv/bin/python
        shell: bash

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/uv-setup-action@v1

      - name: Set up Python
        run: uv python install 3.11

      - name: Build and test
        run: |
          cd python
          uv venv .venv --python 3.11
          uv pip install maturin pytest --python .venv/bin/python
          .venv/bin/python -m maturin build -b pyo3 -i .venv/bin/python
          uv pip install target/wheels/stixflayer-*.whl --python .venv/bin/python
          cd tests
          .venv/bin/python -m pytest -v
        shell: bash